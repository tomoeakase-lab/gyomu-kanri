  }
  .red { color: #c00; }

  /* ===== ヘッダー赤バー ===== */
  .top-bar {
    background: #c00;
    padding: 0;
    text-align: center;
    margin: 0 -16mm 0 -16mm;
  }
  .top-bar img {
    display: block;
    width: 100%;
    height: auto;
  }

  /* ===== タイトルエリア ===== */
  .title-area {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 10px 0 6px;
  }
  .doc-title {
    font-size: 24pt;
    font-weight: 900;
    letter-spacing: 0.35em;
    border-bottom: 2px solid #000;
    padding-bottom: 6px;
    line-height: 0.75;
    display: inline-block;
  }
  .doc-meta {
    text-align: right;
    font-size: 12pt;
    line-height: 1.35;
  }
  .doc-meta .label { color: #333; }

  /* ===== 2カラム ===== */
  .main-cols {
    display: flex;
    gap: 24px;
    margin-top: 12px;
    margin-bottom: 6px;
  }
  .col-left { flex: 1; min-width: 0; }
  .col-right { flex: 0 0 auto; min-width: 0; margin-left: auto; }

  /* --- 左カラム --- */

    font-weight: 900;
    padding-bottom: 3px;
    margin-bottom: 6px;
    display: inline-block;
  }

  .info-tbl tr { border-bottom: 1px solid #555; }

    font-weight: 700;
    white-space: nowrap;
    font-size: 11.5pt;
    padding-right: 12px;
  }

  /* 合計額 */
  .total-display {
    display: inline-flex;

    margin-top: 2px;
    border-bottom: 3px solid #000;
    padding-bottom: 6px;
    line-height: 0.75;
  }
  .total-lbl {
    font-size: 13pt;
    font-weight: 700;
    line-height: 0.9;
    white-space: nowrap;
  }
  .total-lbl small { font-size: 11pt; color: #333; display: block; margin-top: 4px; }
  .total-amt { font-size: 30pt; font-weight: 900; letter-spacing: 0.02em; }

  /* --- 右カラム --- */
  .co-name { font-size: 16pt; font-weight: 900; margin-bottom: 2px; }
  .co-detail { font-size: 11.5pt; line-height: 1.43; color: #111; }
  .co-detail .row { display: flex; }
  .co-detail .lbl2 {
    min-width: 62px;
    flex-shrink: 0;
    color: #333;
  }
  .contact-block { margin-top: 10px; font-size: 12pt; line-height: 1.5; }
  .contact-block .row { display: flex; align-items: baseline; }
  .contact-block .cl { min-width: 58px; flex-shrink: 0; font-size: 11.5pt; }
  .contact-block .cv { font-weight: 500; }
  .staff-block { margin-top: 8px; font-size: 12.5pt; line-height: 1.5; }
  .staff-block .row { display: flex; align-items: baseline; }
  .staff-block .cl { min-width: 42px; flex-shrink: 0; font-size: 11.5pt; color: #333; }
  .staff-block .cv { font-weight: 700; }

  /* ===== 明細テーブル ===== */
  .tbl { width: 100%; border-collapse: collapse; font-size: 12pt; }
  .tbl thead th {
    background: #111;
    color: #fff;
    font-weight: 600;
    padding: 3px 6px;
    font-size: 12pt;
    letter-spacing: 0.15em;
  }
  .tbl tbody td {
    border-bottom: 1px solid #ccc;
    padding: 3px 6px;
    vertical-align: middle;
    font-size: 12pt;
  }
  .tbl tbody tr:last-child td { border-bottom: 2.5px solid #333; }
  .td-no { text-align: center; width: 4%; color: #555; font-size: 11pt; }
  .td-tekiyou { text-align: left; padding-left: 10px !important; }
  .td-tekiyou .detail { margin-left: 16px; color: #333; }
  .td-num { text-align: center; width: 7%; white-space: nowrap; }
  .td-unit { text-align: center; width: 7%; white-space: nowrap; }
  .td-price { text-align: right; width: 14%; padding-right: 10px !important; }
  .td-amt { text-align: right; width: 14%; padding-right: 10px !important; }
  .desc-row {
    font-size: 12pt;
    font-weight: 600;
    padding: 3px 10px !important;
    border-bottom: 1px solid #ccc;
  }
  .sub-desc-row {
    font-size: 11pt;
    font-weight: 700;
    padding: 2px 10px 2px 20px !important;
    border-bottom: 1px solid #ccc;
    color: #222;
  }

  /* ===== 下部合計 ===== */
  .bottom-section {
    display: flex;
    justify-content: flex-end;
    align-items: flex-start;
    gap: 14px;
    margin-top: 6px;
  }
  .bottom-left { flex: 1; }
  .bank-box { border: 1px solid #bbb; padding: 8px 10px; font-size: 11pt; line-height: 1.35; margin-top: 6px; }
  .bank-box strong { color: #333; }
  .sum-tbl { border-collapse: collapse; font-size: 12.5pt; }
  .sum-tbl td { border: 1px solid #999; padding: 4px 14px; }
  .sum-tbl .sl { background: #e8e8e8; font-weight: 700; text-align: center; min-width: 64px; }
  .sum-tbl .sv { text-align: right; min-width: 86px; font-weight: 500; }
  .sum-tbl .grand-row .sl {
    background: #fffde0;
    font-size: 13.5pt;
    font-weight: 900;
    border: 1px solid #999;
  }
  .sum-tbl .grand-row .sv {
    background: #fffde0;
    font-size: 14pt;
    font-weight: 900;
    border: 1px solid #999;
  }

  /* ===== 備考欄 ===== */
  .remarks-box { font-size: 11.5pt; line-height: 1.27; margin-top: 2px; color: #111; }

  /* ===== フッター赤バー ===== */
  .bottom-line { border-top: 2.5px solid #000; margin-top: 20px; }
  .bottom-bar { height: 8px; background: #c00; margin-top: 5px; }

  @media print {
    body { margin: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>

    <div><span class="label">${dateLabelHead}</span>　${issueDate}</div>

      <tr><td class="lbl">お支払条件</td><td class="val">${v('payCondition') || '　'}</td></tr>
      <tr><td class="lbl">${dateLabel}</td><td class="val">${expDateVal}</td></tr>
    </table>

    <div class="total-display">
      <div class="total-lbl">合計<small>（税込）</small></div>
      <div class="total-amt">¥${grand.toLocaleString()}</div>

  </div>

      ${s.companyZip ? `<div>${s.companyZip}</div>` : ''}
      ${s.companyAddr ? `<div>${s.companyAddr}</div>` : ''}

      ${s.companyRegNo ? `<div class="row"><span class="lbl2">登録番号：</span>${s.companyRegNo}</div>` : ''}
